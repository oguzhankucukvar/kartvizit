<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2c5b;
    --navy-dark: #0f1c3a;
    --red: #cc0000;
    --red-light: #e8001a;
    --white: #ffffff;
    --off-white: #f5f5f5;
    --gold: #c9a84c;
    --text-light: #8a9bbf;
  }

  body {
    background: var(--navy-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--navy);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.2);
    position: relative;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Top accent line */
  .card::before {
    content: '';
    display: block;
    height: 4px;
    background: linear-gradient(90deg, var(--red) 0%, var(--gold) 100%);
  }

  /* Background geometric decoration */
  .card-bg {
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 200px;
    background: radial-gradient(circle at top right, rgba(204,0,0,0.08), transparent 70%);
    pointer-events: none;
  }

  .header {
    padding: 32px 32px 0;
    display: flex;
    gap: 24px;
    align-items: flex-end;
    position: relative;
  }

  .photo-wrap {
    flex-shrink: 0;
    width: 110px;
    height: 130px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid rgba(201,168,76,0.4);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    position: relative;
    animation: fadeUp 0.8s 0.1s ease both;
  }

  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .name-block {
    flex: 1;
    padding-bottom: 8px;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .title {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .company {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--red);
    color: var(--white);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .divider {
    margin: 24px 32px 0;
    height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
  }

  .contacts {
    padding: 20px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--white);
    transition: all 0.25s ease;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .contact-item:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(201,168,76,0.3);
    transform: translateX(3px);
  }

  .icon-circle {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-circle svg {
    width: 17px;
    height: 17px;
  }

  .contact-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
    line-height: 1;
  }

  .contact-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    margin-top: 2px;
    line-height: 1.3;
  }

  .contact-info { flex: 1; }

  .phone .icon-circle { background: rgba(204,0,0,0.2); }
  .email .icon-circle { background: rgba(26,44,91,0.6); border: 1px solid rgba(201,168,76,0.2); }
  .facebook .icon-circle { background: rgba(24,119,242,0.2); }
  .instagram .icon-circle { background: rgba(225,48,108,0.2); }
  .linkedin .icon-circle { background: rgba(10,102,194,0.2); }
  .youtube .icon-circle { background: rgba(255,0,0,0.2); }

  .divider2 {
    margin: 0 32px;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .footer {
    padding: 16px 32px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .tagline {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-light);
    letter-spacing: 0.5px;
    font-style: italic;
  }

  .remax-badge {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    opacity: 0.7;
  }

  /* QR hint */
</style>
